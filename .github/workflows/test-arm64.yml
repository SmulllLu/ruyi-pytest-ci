name: Ruyi Pytest (arm64 multi-distro)

on:
  workflow_dispatch:
    inputs:
      ruyi_version:
        description: "RUYI_VERSION to test"
        required: true
        default: "0.49.0-beta.20260519"
      test_start_time:
        description: "TEST_START_TIME (YYYYMMDD)"
        required: true
        default: "20260520"

jobs:
  pytest-arm64:
    runs-on: ubuntu-24.04-arm

    strategy:
      fail-fast: false
      matrix:
        distro:
          - debian_trixie
          - debian_sid
          - ubuntu_noble
          - ubuntu_resolute
          - openeuler_2403_sp1
          - openeuler_2403_sp2
          - openeuler_2503
          - fedora_42
          - fedora_43
          - deepin_crimson_arm64
          - openkylin
          - opencloudos

    env:
      RUYI_VERSION: ${{ inputs.ruyi_version }}
      TEST_START_TIME: ${{ inputs.test_start_time }}

    steps:
      - name: Checkout ruyi-pytest
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      #- name: Free space on ARM runner
      #  run: |
      #    echo "Disk usage before cleanup:"
      #    df -h /

          # Remove large preinstalled SDKs and logs
      #    sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /usr/local/share/powershell || true
      #    sudo rm -rf /home/runner/actions-runner/_diag/* || true
      #    sudo rm -rf /home/runner/work/_temp || true

          # Optional: clean caches
      #    sudo apt-get clean || true
      #    sudo rm -rf ~/.cache/pip ~/.cache/npm ~/.cache/yarn ~/.cache/node-gyp || true

      #    echo "Disk usage after cleanup:"
      #    df -h /

      - name: Build test image for ${{ matrix.distro }}
        run: |
          docker build \
            --build-arg RUYI_VERSION="$RUYI_VERSION" \
            -f docker/distros/${{ matrix.distro }}.Dockerfile \
            -t ruyi-pytest:${{ matrix.distro }} .

      - name: Run pytest in Docker (${{ matrix.distro }})
        run: |
          mkdir -p artifacts/${{ matrix.distro }}
          docker run --rm \
            -e RUYI_VERSION \
            -e TEST_START_TIME \
            -e DISTRO_ID=${{ matrix.distro }} \
            -v "$PWD/artifacts/${{ matrix.distro }}:/artifacts" \
            ruyi-pytest:${{ matrix.distro }}

      - name: Upload artifacts for ${{ matrix.distro }}
        uses: actions/upload-artifact@v4
        with:
          name: ruyi-pytest-${{ matrix.distro }}
          path: artifacts/${{ matrix.distro }}
          if-no-files-found: error

