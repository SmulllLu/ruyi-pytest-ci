name: Ruyi Pytest (multi-distro)

on:
  workflow_dispatch:
    inputs:
      ruyi_version:
        description: "RUYI_VERSION to test"
        required: true
        default: "0.49.0-beta.20260519"
      test_start_time:
        description: "TEST_START_TIME (YYYYMMDD)"
        required: true
        default: "20260520"

jobs:
  litester:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        distro:
          - debian_trixie
          - debian_sid
          - ubuntu_noble
          - ubuntu_resolute
          - openeuler_2403_sp1
          - openeuler_2403_sp2
          - openeuler_2503
          - archlinux
          - fedora_42
          - fedora_43
          - deepin_beige
          - deepin_crimson
          - openkylin
          - opencloudos

    env:
      RUYI_VERSION: ${{ inputs.ruyi_version }}
      TEST_START_TIME: ${{ inputs.test_start_time }}

    steps:
      - name: Checkout ruyi-pytest
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Checkout ruyi-pytest-reports
        uses: actions/checkout@v4
        with:
          repository: ruyisdk-test/ruyi-pytest-reports
          path: ruyi-pytest-reports

      - name: Build test image for ${{ matrix.distro }}
        run: |
          docker build \
            --build-arg RUYI_VERSION="$RUYI_VERSION" \
            -f docker/distros/${{ matrix.distro }}.Dockerfile \
            -t ruyi-pytest:${{ matrix.distro }} .

      - name: Run pytest in Docker (${{ matrix.distro }})
        run: |
          mkdir -p artifacts/${{ matrix.distro }}
          docker run --rm \
            -e RUYI_VERSION \
            -e TEST_START_TIME \
            -e DISTRO_ID=${{ matrix.distro }} \
            -v "$PWD/artifacts/${{ matrix.distro }}:/artifacts" \
            ruyi-pytest:${{ matrix.distro }}

      - name: Upload artifacts for ${{ matrix.distro }}
        uses: actions/upload-artifact@v4
        with:
          name: ruyi-pytest-${{ matrix.distro }}
          path: artifacts/${{ matrix.distro }}
          if-no-files-found: error

